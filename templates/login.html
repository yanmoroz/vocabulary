{% extends "base.html" %}
{% block content %}
  <div class="auth-card">
    <h2>Log in</h2>

    {% if form.errors %}
      <p class="auth-error">Wrong username or password.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input id="id_username" type="text" name="username" autofocus autocapitalize="none" autocomplete="username" required>

      <label for="id_password">Password</label>
      <input id="id_password" type="password" name="password" autocomplete="current-password" required>

      <button type="submit" class="btn-primary">Log in</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
{% endblock %}
